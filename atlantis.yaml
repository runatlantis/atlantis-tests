version: 3

# Autodiscovery for projects without explicit config.
# Only autodiscovery/included-a and autodiscovery/included-b are intentionally
# auto-discovered; everything else has explicit project entries.
autodiscover:
  mode: enabled
  ignore_paths:
    - "autodiscovery/ignored"
    - "drift/**"
    - "multi-projects/shared-module"
    - "output/failure"

projects:
  # --- Original smoke-test fixtures (backward-compatible) ---
  - dir: standalone
    name: standalone

  - dir: standalone-with-workspace
    name: standalone-with-workspace
    workspace: staging

  # --- Multi-project explicit config ---
  - dir: multi-projects/project1
    name: project1
    autoplan:
      when_modified:
        - "*.tf"
        - "../shared-module/*.tf"

  - dir: multi-projects/project2
    name: project2
    autoplan:
      when_modified:
        - "*.tf"
        - "../shared-module/*.tf"

  - dir: multi-projects/project-with-workspace
    name: project-with-workspace
    workspace: dev

  # --- Autodiscovery: explicit takes precedence over discovered ---
  - dir: autodiscovery/explicit
    name: autodiscovery-explicit
    autoplan:
      when_modified:
        - "*.tf"

  # --- Detection: .tf, .tf.json, OpenTofu ---
  - dir: detection/terraform-tf
    name: detection-tf

  - dir: detection/terraform-json
    name: detection-json

  - dir: detection/opentofu-basic
    name: detection-opentofu
    terraform_distribution: opentofu

  # --- Custom workflow: PROJECT_NAME env assertion ---
  - dir: custom-workflows/project-name-env
    name: custom-workflow-env
    workflow: assert-project-name

  # --- v0.46.0 apply regressions (#6641 and #6642) ---
  - dir: apply-regressions/builtin-autoplan-apply
    name: builtin-autoplan-apply

  - dir: apply-regressions/builtin-replan-apply
    name: builtin-replan-apply

  - dir: apply-regressions/mixed-plan-mutation
    name: mixed-plan-mutation
    workflow: mixed-plan-mutation

  - dir: custom-workflows/custom-plan-path
    name: custom-plan-path
    workflow: custom-plan-path

  - dir: custom-workflows/custom-plan-replan
    name: custom-plan-replan
    workflow: custom-plan-replan

  # --- Output rendering fixtures ---
  - dir: output/heredoc
    name: output-heredoc

  - dir: output/long-line
    name: output-long-line

  - dir: output/failure
    name: output-failure
    workflow: intentional-failure
    autoplan:
      enabled: false

  # --- Locking lifecycle fixtures ---
  - dir: locking/on-apply-lock-preservation
    name: locking-on-apply-preservation
    workspace: default
    # NOTE: The future #6531 runner scenario must run this project with
    # repo_locks.mode: on_apply. Do not set repo_locks here until the
    # upstream E2E server allows repo_locks as a repo-side override.

workflows:
  assert-project-name:
    plan:
      steps:
        - run: sh ../scripts/assert-project-name.sh
        - init
        - plan

  intentional-failure:
    plan:
      steps:
        - run: echo "ATLANTIS_E2E_FAILURE_MARKER" && exit 1

  custom-plan-path:
    plan:
      steps:
        - run: mkdir -p generated/dev generated/staging
        - run: terraform init -input=false -no-color
        - run: terraform plan -input=false -no-color -out=generated/dev/atlantis.tfplan
        - run: terraform plan -input=false -no-color -out=generated/staging/atlantis.tfplan
        - run: test -f generated/dev/atlantis.tfplan && test -f generated/staging/atlantis.tfplan
        - run: test ! -e custom-plan-path-default.tfplan
        - run: echo ATLANTIS_E2E_CUSTOM_PLAN_CREATED generated/dev/atlantis.tfplan generated/staging/atlantis.tfplan
    apply:
      steps:
        - run: test -f generated/dev/atlantis.tfplan && test -f generated/staging/atlantis.tfplan
        - run: test ! -e custom-plan-path-default.tfplan
        - run: terraform apply -input=false -no-color generated/dev/atlantis.tfplan
        - run: test -f generated/dev/atlantis.tfplan && test -f generated/staging/atlantis.tfplan && test ! -e custom-plan-path-default.tfplan
        - run: echo ATLANTIS_E2E_CUSTOM_PLAN_APPLY_OK

  custom-plan-replan:
    plan:
      steps:
        - run: terraform init -input=false -no-color
        - run: terraform plan -input=false -no-color -out=custom-replan.tfplan
        - run: test -f custom-replan.tfplan
        - run: sh plan-generation-marker.sh
    apply:
      steps:
        - run: test -f custom-replan.tfplan
        - run: terraform apply -input=false -no-color custom-replan.tfplan
        - run: echo ATLANTIS_E2E_CUSTOM_REPLAN_APPLY_OK

  mixed-plan-mutation:
    apply:
      steps:
        - run: printf '\nATLANTIS_E2E_MIXED_PLAN_MUTATED\n' >> "$PLANFILE"
        - apply
        - run: echo ATLANTIS_E2E_MIXED_BUILTIN_APPLY_MUST_NOT_RUN
